name: Build Android Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-main-app:
    name: Build Main App (محفظة الجنوب)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Remove API routes (incompatible with static export)
        run: |
          rm -rf src/app/api/admin src/app/api/auth src/app/api/notifications \
            src/app/api/products src/app/api/seed src/app/api/seed-banners \
            src/app/api/send-push src/app/api/transactions src/app/api/transfer \
            src/app/api/user src/app/api/__tests__ src/app/api/route.ts || true

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "file::memory:"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../../south-wallet.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD=southwallet123 \
            -PMYAPP_UPLOAD_KEY_ALIAS=southwallet \
            -PMYAPP_UPLOAD_KEY_PASSWORD=southwallet123

      - name: Upload Main App APK
        uses: actions/upload-artifact@v4
        with:
          name: main-app-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  build-admin-app:
    name: Build Admin App (الإدارة)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        working-directory: south-admin
        run: npm ci

      - name: Build Next.js
        working-directory: south-admin
        run: npm run build

      - name: Sync Capacitor
        working-directory: south-admin
        run: npx cap sync android

      - name: Build Android APK
        working-directory: south-admin/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../../../south-wallet.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD=southwallet123 \
            -PMYAPP_UPLOAD_KEY_ALIAS=southwallet \
            -PMYAPP_UPLOAD_KEY_PASSWORD=southwallet123

      - name: Upload Admin App APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-apk
          path: south-admin/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  build-dev-app:
    name: Build Dev App (مركز النسخ)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        working-directory: south-dev
        run: npm install

      - name: Build Next.js
        working-directory: south-dev
        run: npm run build

      - name: Sync Capacitor
        working-directory: south-dev
        run: npx cap sync android

      - name: Build Android APK
        working-directory: south-dev/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../../../south-wallet.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD=southwallet123 \
            -PMYAPP_UPLOAD_KEY_ALIAS=southwallet \
            -PMYAPP_UPLOAD_KEY_PASSWORD=southwallet123

      - name: Upload Dev App APK
        uses: actions/upload-artifact@v4
        with:
          name: dev-app-apk
          path: south-dev/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
